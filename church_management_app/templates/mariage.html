<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariages - Consolation et Paix Divine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="static/css/main.css">
    <style>
        .sidebar { width: 280px; height: 100vh; position: fixed; top: 0; left: 0; background: white; border-right: 1px solid #e2e8f0; z-index: 1040; overflow-y: auto; transition: transform 0.3s; }
        [data-bs-theme="dark"] .sidebar { background: #0f172a; border-right-color: #334155; }
        .main-content { margin-left: 280px; min-height: 100vh; background: #f8fafc; }
        [data-bs-theme="dark"] .main-content { background: #0f172a; }
        @media (max-width: 991.98px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .main-content { margin-left: 0; }
        }
        .sidebar-backdrop { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1035; }
        .sidebar-backdrop.show { display: block; }
        .marriage-card { transition: all 0.2s; border-left: 4px solid #ec4899; }
        .marriage-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <aside class="sidebar" id="sidebar">
        <div class="p-4 border-bottom">
            <div class="d-flex align-items-center gap-3">
                <div class="rounded-3 p-2" style="background: rgba(99,102,241,0.1);">
                    <i class="bi bi-layers fs-4" style="color: #6366f1;"></i>
                </div>
                <div>
                    <h6 class="mb-0 fw-semibold">Consolation et Paix Divine</h6>
                    <small class="text-muted">Plateforme de gestion</small>
                </div>
            </div>
        </div>
        <div class="p-3">
            <div class="rounded-3 p-3 mb-3" style="background: #f1f5f9;">
                <small class="text-muted d-block">Connecté en tant que</small>
                <span class="fw-semibold" id="userRole">Utilisateur</span>
            </div>
        </div>
        <nav class="px-3 pb-4" id="sidebarNav"></nav>
    </aside>

    <main class="main-content">
        <header class="sticky-top bg-white border-bottom" style="backdrop-filter: blur(10px); background: rgba(255,255,255,0.9);">
            <div class="container-fluid py-3 px-4">
                <div class="d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center gap-3">
                        <button class="btn btn-light d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
                        <h5 class="mb-0 fw-semibold"><i class="bi bi-heart me-2"></i>Mariages</h5>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-light" id="themeToggle"><i class="bi bi-moon" id="themeIcon"></i></button>
                        <button class="btn btn-danger" id="logoutBtn"><i class="bi bi-box-arrow-right"></i></button>
                    </div>
                </div>
            </div>
        </header>

        <div class="container-fluid p-4">
            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <div class="d-flex align-items-center">
                                <div class="rounded-3 p-3 me-3" style="background: rgba(236,72,153,0.1);">
                                    <i class="bi bi-heart fs-4" style="color: #ec4899;"></i>
                                </div>
                                <div>
                                    <p class="text-muted mb-0 small">Total Mariages</p>
                                    <h4 class="mb-0 fw-bold" id="totalMarriages">-</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <div class="d-flex align-items-center">
                                <div class="rounded-3 p-3 me-3" style="background: rgba(16,185,129,0.1);">
                                    <i class="bi bi-calendar-check fs-4" style="color: #10b981;"></i>
                                </div>
                                <div>
                                    <p class="text-muted mb-0 small">Cette année</p>
                                    <h4 class="mb-0 fw-bold" id="yearMarriages">-</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <div class="d-flex align-items-center">
                                <div class="rounded-3 p-3 me-3" style="background: rgba(245,158,11,0.1);">
                                    <i class="bi bi-calendar-event fs-4" style="color: #f59e0b;"></i>
                                </div>
                                <div>
                                    <p class="text-muted mb-0 small">À venir</p>
                                    <h4 class="mb-0 fw-bold" id="upcomingMarriages">-</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3 align-items-center">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                                <input type="text" class="form-control border-0 bg-light" id="searchInput" placeholder="Rechercher un couple...">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <select class="form-select bg-light border-0" id="yearFilter">
                                <option value="">Toutes les années</option>
                                <option value="2024">2024</option>
                                <option value="2023">2023</option>
                                <option value="2022">2022</option>
                            </select>
                        </div>
                        <div class="col-md-4 text-md-end">
                            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addMarriageModal">
                                <i class="bi bi-plus-lg me-2"></i>Nouveau mariage
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Marriages Grid -->
            <div class="row g-3" id="marriagesGrid">
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary"></div>
                    <p class="text-muted mt-2">Chargement...</p>
                </div>
            </div>

            <!-- Pagination -->
            <nav class="mt-4" id="paginationNav" style="display: none;">
                <ul class="pagination justify-content-center">
                    <li class="page-item"><a class="page-link" href="#" id="prevPage">Précédent</a></li>
                    <li class="page-item"><span class="page-link" id="pageInfo">Page 1</span></li>
                    <li class="page-item"><a class="page-link" href="#" id="nextPage">Suivant</a></li>
                </ul>
            </nav>
        </div>
    </main>

    <!-- Add Marriage Modal -->
    <div class="modal fade" id="addMarriageModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-semibold">Nouveau mariage</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="marriageForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Époux *</label>
                                <select class="form-select" name="husband" required>
                                    <option value="">Sélectionner...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Épouse *</label>
                                <select class="form-select" name="wife" required>
                                    <option value="">Sélectionner...</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Date du mariage *</label>
                                <input type="date" class="form-control" name="marriage_date" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Date de demande</label>
                                <input type="date" class="form-control" name="request_date">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Officiant</label>
                                <input type="text" class="form-control" name="officiant" placeholder="Nom du pasteur/officiant">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Témoins</label>
                                <input type="text" class="form-control" name="witnesses" placeholder="Noms des témoins">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Notes</label>
                                <textarea class="form-control" name="notes" rows="2"></textarea>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="is_blessed" id="isBlessed">
                            <label class="form-check-label" for="isBlessed">Bénédiction par l'église</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" onclick="saveMarriage()">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/api.js"></script>
    <script src="static/js/utils.js"></script>
    <script src="static/js/toast.js"></script>
    <script src="static/js/auth.js"></script>
    <script src="static/js/navigation.js"></script>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let searchQuery = '';
        let yearFilter = '';
        let members = [];

        document.addEventListener('DOMContentLoaded', async function() {
            if (!Auth.state.isAuthenticated) {
                await Auth.refreshMe();
                if (!Auth.state.isAuthenticated) {
                    window.location.href = 'login.html';
                    return;
                }
            }

            initUI();
            loadMembers();
            loadMarriages();
            loadStats();

            document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
            document.getElementById('sidebarBackdrop').addEventListener('click', toggleSidebar);
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());
            document.getElementById('searchInput').addEventListener('input', debounce(() => { searchQuery = document.getElementById('searchInput').value; currentPage = 1; loadMarriages(); }, 300));
            document.getElementById('yearFilter').addEventListener('change', () => { yearFilter = document.getElementById('yearFilter').value; currentPage = 1; loadMarriages(); });
            document.getElementById('prevPage').addEventListener('click', (e) => { e.preventDefault(); if (currentPage > 1) { currentPage--; loadMarriages(); } });
            document.getElementById('nextPage').addEventListener('click', (e) => { e.preventDefault(); if (currentPage < totalPages) { currentPage++; loadMarriages(); } });
        });

        function initUI() {
            const user = Auth.state.user;
            document.getElementById('userRole').textContent = user?.role || 'Utilisateur';
            if (window.Navigation) Navigation.render('sidebarNav', 'mariage');
            Utils.Theme.init();
            updateThemeIcon();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
            document.getElementById('sidebarBackdrop').classList.toggle('show');
        }

        function toggleTheme() {
            Utils.Theme.toggle();
            updateThemeIcon();
        }

        function updateThemeIcon() {
            document.getElementById('themeIcon').className = Utils.Theme.get() === 'dark' ? 'bi bi-sun' : 'bi bi-moon';
        }

        function debounce(fn, delay) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        async function loadMembers() {
            try {
                const response = await API.api.get('/api/members/', { limit: 1000 });
                members = response.results || response;
                
                const men = members.filter(m => m.gender === 'M').map(m => `<option value="${m.id}">${m.first_name} ${m.last_name}</option>`).join('');
                const women = members.filter(m => m.gender === 'F').map(m => `<option value="${m.id}">${m.first_name} ${m.last_name}</option>`).join('');
                
                document.querySelector('select[name="husband"]').innerHTML = '<option value="">Sélectionner...</option>' + men;
                document.querySelector('select[name="wife"]').innerHTML = '<option value="">Sélectionner...</option>' + women;
            } catch (error) {
                console.error('Failed to load members:', error);
            }
        }

        async function loadStats() {
            try {
                const response = await API.api.get('/api/marriages/stats/');
                document.getElementById('totalMarriages').textContent = response.total || 0;
                document.getElementById('yearMarriages').textContent = response.this_year || 0;
                document.getElementById('upcomingMarriages').textContent = response.upcoming || 0;
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function loadMarriages() {
            try {
                const params = { page: currentPage, ordering: '-marriage_date' };
                if (searchQuery) params.search = searchQuery;
                if (yearFilter) params.year = yearFilter;

                const response = await API.api.get('/api/marriages/', params);
                const marriages = response.results || response;
                
                renderMarriages(marriages);
                updatePagination(response.count, marriages.length);
            } catch (error) {
                console.error('Failed to load marriages:', error);
                document.getElementById('marriagesGrid').innerHTML = '<div class="col-12 text-center text-muted py-4">Erreur de chargement</div>';
            }
        }

        function renderMarriages(marriages) {
            const container = document.getElementById('marriagesGrid');
            
            if (marriages.length === 0) {
                container.innerHTML = '<div class="col-12 text-center py-5"><i class="bi bi-heart fs-1 text-muted mb-3 d-block"></i><p class="text-muted">Aucun mariage enregistré</p></div>';
                return;
            }

            container.innerHTML = marriages.map(m => `
                <div class="col-md-6 col-xl-4">
                    <div class="card border-0 shadow-sm marriage-card h-100">
                        <div class="card-body">
                            <div class="text-center mb-3">
                                <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
                                    <span class="fw-semibold">${m.husband_name || '?'}</span>
                                    <i class="bi bi-heart-fill text-danger"></i>
                                    <span class="fw-semibold">${m.wife_name || '?'}</span>
                                </div>
                                <span class="badge bg-light text-dark">${m.is_blessed ? '<i class="bi bi-check-circle-fill text-success me-1"></i>Béni' : 'Civil'}</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center py-2 border-top">
                                <span class="text-muted small"><i class="bi bi-calendar me-1"></i>Mariage</span>
                                <span class="fw-medium">${Utils.formatDateShort(m.marriage_date)}</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center py-2">
                                <span class="text-muted small"><i class="bi bi-person me-1"></i>Officiant</span>
                                <span class="fw-medium">${m.officiant || 'N/A'}</span>
                            </div>
                            ${m.notes ? `<p class="text-muted small mt-2 mb-0" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${m.notes}</p>` : ''}
                            <div class="d-flex gap-2 mt-3">
                                <button class="btn btn-sm btn-outline-primary flex-fill" onclick="viewMarriage(${m.id})"><i class="bi bi-eye me-1"></i>Voir</button>
                                ${Auth.isAdmin() ? `<button class="btn btn-sm btn-light" onclick="deleteMarriage(${m.id})"><i class="bi bi-trash text-danger"></i></button>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updatePagination(totalCount, pageSize) {
            totalPages = Math.ceil(totalCount / (pageSize || 10)) || 1;
            document.getElementById('pageInfo').textContent = `Page ${currentPage} / ${totalPages}`;
            document.getElementById('paginationNav').style.display = totalPages > 1 ? 'block' : 'none';
            document.getElementById('prevPage').parentElement.classList.toggle('disabled', currentPage === 1);
            document.getElementById('nextPage').parentElement.classList.toggle('disabled', currentPage === totalPages);
        }

        async function saveMarriage() {
            const form = document.getElementById('marriageForm');
            const data = Object.fromEntries(new FormData(form));
            data.is_blessed = form.elements['is_blessed'].checked;

            if (data.husband === data.wife) {
                Toast.error('Erreur', 'L\'époux et l\'épouse doivent être différents');
                return;
            }

            try {
                await API.api.post('/api/marriages/', data);
                Toast.success('Succès', 'Mariage enregistré');
                bootstrap.Modal.getInstance(document.getElementById('addMarriageModal')).hide();
                form.reset();
                loadMarriages();
                loadStats();
            } catch (error) {
                Toast.error('Erreur', 'Impossible d\'enregistrer');
            }
        }

        async function deleteMarriage(id) {
            if (!confirm('Supprimer ce mariage ?')) return;
            try {
                await API.api.delete(`/api/marriages/${id}/`);
                Toast.success('Succès', 'Mariage supprimé');
                loadMarriages();
                loadStats();
            } catch (error) {
                Toast.error('Erreur', 'Impossible de supprimer');
            }
        }

        function viewMarriage(id) {
            Toast.info('Info', 'Détail à implémenter');
        }
    </script>
</body>
</html>
